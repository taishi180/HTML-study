<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <h1>HTMLの基礎を学ぼう</h1>

    <!-- Step 2: ここに <h2> と <p> を追加しよう -->
    <h1>紙本泰志</h1>

    <h2>はじめまして</h2>
    <p>私の名前は紙本泰志です。web制作の勉強をしています。</p>
    <p>趣味はゲームです</p>

    <h2>好きな食べ物</h2>
    <p>寿司が一番好きです。</p>

    <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
    <div>
      <h2>趣味リスト</h2>
      <ul>
        <li>音楽鑑賞</li>
        <li>ゲーム</li>
        <li>YouTube見る</li>
      </ul>
    </div>

    <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
    <h2>リンク</h2>
    <p><a href="https://www.youtube.com/">YouTubeを開く</a></p>

    <h2>画像</h2>
    <img src="c:\Users\cre\Downloads\Untitled.jpg" alt="サンプル画像" />
    <!-- Step 5: <div> でグループ化してみよう -->
  </body>
</html>
